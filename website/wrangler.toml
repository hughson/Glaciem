# Wrangler config for the Glaciem static website worker.
#
# Deploys website/public/ as the worker at https://glaciem.frostmine.workers.dev/.
#
# To deploy after editing the HTML:
#   cd website && npx wrangler deploy
#
# Uses Cloudflare's static-assets binding -- no worker script needed; the
# assets directory is served directly. Public-facing files live in ./public/
# so this config itself (and the .wrangler cache) isn't exposed at the root.

name = "glaciem"
compatibility_date = "2026-05-20"

[assets]
directory = "./public"
not_found_handling = "404-page"
